name: Sync Get Notes To Notion

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */4 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run sync
        env:
          GETNOTE_API_KEY: ${{ secrets.GETNOTE_API_KEY }}
          GETNOTE_CLIENT_ID: ${{ secrets.GETNOTE_CLIENT_ID }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python -X utf8 ./sync_entry.py

      - name: Keep repository alive
        if: github.event_name == 'schedule'
        shell: bash
        run: |
          last_commit_ts="$(git log -1 --format=%ct)"
          now_ts="$(date +%s)"
          age_days="$(((now_ts - last_commit_ts) / 86400))"

          if [ "$age_days" -lt 45 ]; then
            echo "Repository activity is recent ($age_days days); skipping keepalive commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keepalive [skip ci]"
          git push
